name: Deploy Jekyll BL4 Items Site

# Trigger on pushes to main or manual workflow dispatch
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Set permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Ruby for Jekyll
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'  # Match your local Ruby version
          bundler-cache: true

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          gem install bundler
          bundle install

      # 4. Build Jekyll site
      - name: Build Jekyll site
        run: bundle exec jekyll build -d ./_site

      # 5. Upload the site as artifact for deployment
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # 1. Deploy the built site to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
